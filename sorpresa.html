<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¡Feliz Cumpleaños! 🎉</title>

<!-- FUENTES MODERNAS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;
    background: radial-gradient(circle at top, #6a11cb, #2575fc);
  }

  .container {
    margin-top: 80px;
    padding: 30px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 2.8em;
    margin-bottom: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  p {
    font-size: 1.2em;
    opacity: 0.9;
  }

  button {
    margin-top: 25px;
    padding: 14px 30px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    background: linear-gradient(135deg, #ff7a18, #ffb347);
    color: white;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  button:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  #mensaje {
    display: none;
    margin-top: 30px;
    font-size: 1.4em;
    animation: aparecer 1s ease forwards;
  }

  @keyframes aparecer {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Confeti */
  .confetti {
    position: absolute;
    top: -10px;
    opacity: 0.9;
    animation: caer linear forwards;
  }

  @keyframes caer {
    to {
      transform: translateY(100vh) rotate(720deg);
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🎉 ¡Feliz Cumpleaños! 🎂</h1>
  <p>De parte de todo el equipo, te deseamos un excelente día lleno de éxitos.</p>

  <button onclick="mostrar()">Ver mensaje 🎁</button>

  <div id="mensaje">
    <p>🎈 Gracias por ser parte de nuestro equipo.</p>
    <p>¡Que este nuevo año esté lleno de logros y momentos increíbles! 🚀</p>
  </div>
</div>

<script>
function mostrar() {
  document.getElementById("mensaje").style.display = "block";
  lanzarConfeti();
}

function lanzarConfeti() {
  const colores = ["#ff4d4d", "#ffd700", "#00e6ac", "#66ccff", "#ff66cc"];

  for (let i = 0; i < 80; i++) {
    let confeti = document.createElement("div");
    confeti.classList.add("confetti");

    confeti.style.left = Math.random() * window.innerWidth + "px";
    confeti.style.background = colores[Math.floor(Math.random() * colores.length)];
    confeti.style.width = confeti.style.height = (Math.random() * 8 + 6) + "px";
    confeti.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(confeti);

    setTimeout(() => confeti.remove(), 5000);
  }
}
</script>

</body>
</html>
